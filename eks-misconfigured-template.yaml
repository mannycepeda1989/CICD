AWSTemplateFormatVersion: '2010-09-09'
Description: 'EKS Cluster with Intentional Security Misconfigurations for Testing'

Parameters:
  ClusterName:
    Type: String
    Default: misconfigured-eks-cluster
    Description: Name of the EKS cluster
  
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 1
  
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2
  
  NodeInstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for EKS nodes
  
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access to nodes
  
  # MISCONFIGURATION 4: Hardcoded secrets in parameters
  DatabasePassword:
    Type: String
    Default: SuperSecret123!
    Description: MISCONFIGURED - Hardcoded database password
    NoEcho: false
  
  APIKey:
    Type: String
    Default: AKIAIOSFODNN7EXAMPLE
    Description: MISCONFIGURED - Hardcoded AWS-like API key
  
  SecretToken:
    Type: String
    Default: ghp_1234567890abcdefghijklmnopqrstuvwxyz
    Description: MISCONFIGURED - Hardcoded GitHub token

Resources:
  # VPC Configuration
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # MISCONFIGURATION 3: Overly permissive security group allowing all traffic
  EKSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EKS cluster - MISCONFIGURED with overly permissive rules
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # MISCONFIGURATION: Allowing ALL traffic from anywhere
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: MISCONFIGURED - Allows all inbound traffic from anywhere
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-cluster-sg
        - Key: SecurityIssue
          Value: OverlyPermissive

  # MISCONFIGURATION 1: Node security group with SSH access from 0.0.0.0/0
  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EKS nodes - MISCONFIGURED with open SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # MISCONFIGURATION: SSH access from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: MISCONFIGURED - SSH access from anywhere
        - IpProtocol: -1
          SourceSecurityGroupId: !Ref EKSClusterSecurityGroup
          Description: Allow all traffic from cluster security group
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-node-sg
        - Key: SecurityIssue
          Value: OpenSSH

  # EKS Cluster IAM Role
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-cluster-role

  # MISCONFIGURATION 4: IAM Role with hardcoded credentials in inline policy
  EKSNodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        # MISCONFIGURATION: Inline policy with hardcoded credentials
        - PolicyName: HardcodedSecretsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource: '*'
                Condition:
                  StringEquals:
                    # MISCONFIGURED: Hardcoded access credentials
                    aws:username: admin
                    aws:password: !Ref DatabasePassword
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-node-role
        - Key: SecurityIssue
          Value: HardcodedCredentials

  # MISCONFIGURATION 2: EKS Cluster without secrets encryption
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: '1.28'
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref EKSClusterSecurityGroup
        SubnetIds:
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        EndpointPublicAccess: true
        EndpointPrivateAccess: false
      # MISCONFIGURATION: No EncryptionConfig specified - secrets encryption disabled
      # EncryptionConfig property is intentionally omitted
      Tags:
        - Key: Name
          Value: !Ref ClusterName
        - Key: SecurityIssue
          Value: NoSecretsEncryption

  # EKS Node Group with misconfigurations
  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: !Sub ${ClusterName}-node-group
      NodeRole: !GetAtt EKSNodeRole.Arn
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      ScalingConfig:
        MinSize: 1
        DesiredSize: 2
        MaxSize: 3
      InstanceTypes:
        - !Ref NodeInstanceType
      # MISCONFIGURATION: Remote access enabled with SSH from 0.0.0.0/0
      RemoteAccess:
        Ec2SshKey: !Ref KeyPairName
        SourceSecurityGroups:
          - !Ref NodeSecurityGroup
      Tags:
        Name: !Sub ${ClusterName}-node-group
        SecurityIssue: OpenSSHAccess

Outputs:
  ClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  ClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-ClusterEndpoint

  ClusterSecurityGroup:
    Description: Security Group ID for EKS Cluster (MISCONFIGURED - Overly Permissive)
    Value: !Ref EKSClusterSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-ClusterSecurityGroup

  NodeSecurityGroup:
    Description: Security Group ID for EKS Nodes (MISCONFIGURED - Open SSH)
    Value: !Ref NodeSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-NodeSecurityGroup

  SecurityMisconfigurations:
    Description: List of intentional security misconfigurations
    Value: |
      1. SSH access from 0.0.0.0/0 to node group (Port 22 open to internet)
      2. Secrets encryption disabled (No EncryptionConfig on EKS cluster)
      3. Overly permissive cluster security group (All traffic from 0.0.0.0/0)
      4. Hardcoded secrets in parameters and IAM policies
  
  HardcodedSecrets:
    Description: Hardcoded secrets (MISCONFIGURED - Never do this in production!)
    Value: !Sub |
      Database Password: ${DatabasePassword}
      API Key: ${APIKey}
      Secret Token: ${SecretToken}

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPC

  NodeGroupName:
    Description: EKS Node Group Name
    Value: !Ref EKSNodeGroup
    Export:
      Name: !Sub ${AWS::StackName}-NodeGroup

