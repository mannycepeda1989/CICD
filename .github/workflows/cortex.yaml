- name: Run Checkov SCA Scanning
    if: inputs.action == 'deploy'
    id: checkov
    uses: bridgecrewio/checkov-action@master
    env:
        PRISMA_API_URL: ${{ secrets.PRISMA_API_URL }}
        BC_API_KEY: ${{ secrets.BC_API_KEY }}
    with:
        framework: sca_package
        output_format: cli
        soft_fail: false
        directory: .
        # Block on HIGH (CVSS 7.0–8.9) and CRITICAL (CVSS 9.0–10.0).
        # Checkov has no exact CVSS score threshold; HIGH is the closest to > 8.
        hard_fail_on: HIGH
