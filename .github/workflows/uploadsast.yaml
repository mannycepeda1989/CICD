name: Cortex Upload Test

on:
  workflow_dispatch:

jobs:
  upload-sarif:
    runs-on: ubuntu-latest

    env:
      SARIF_PATH: "semgrep_report-vul.sarif"
      CORTEX_API_URL: https://api-tac-c1.xdr.us.paloaltonetworks.com
      CORTEX_3RD_API_KEY_ID: ${{secrets.CORTEX_3RD_API_KEY_ID}}
      CORTEX_3RD_API_KEY: ${{secrets.CORTEX_3RD_API_KEY}}
      REPO_ID: 63ac357e6d0916c6f33ee6895ae56090782f2524e87afd7ede87f65c1305bbd5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Send SARIF to Cortex Cloud
        shell: bash
        run: |
          echo "Checking for file at: ${SARIF_PATH}"
          
          if [ ! -f "${SARIF_PATH}" ]; then
            echo "::error::SARIF file not found at ${SARIF_PATH}. Did you commit it to the repo?"
            exit 1
          fi

          echo "Uploading to Cortex..."
          
          http_code=$(curl -sS -X POST \
            "${CORTEX_API_URL}?repository_id=${REPO_ID}&branch=main" \
            -H "Authorization: ${CORTEX_API_KEY}" \
            -H "x-crtx-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Content-Type: application/json" \
            --data-binary "@${SARIF_PATH}" \
            -o /tmp/cortex_response.json \
            -w "%{http_code}")

          echo "HTTP Status: ${http_code}"
          echo "Response Body:"
          cat /tmp/cortex_response.json

          if [ "${http_code}" = "200" ] || [ "${http_code}" = "201" ]; then
            echo "Upload Successful!"
            exit 0
          else
            echo "::error::Upload Failed with status ${http_code}"
            exit 1
          fi
